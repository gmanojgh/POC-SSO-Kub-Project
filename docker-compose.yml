services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: reportdb
      POSTGRES_USER: reportuser
      POSTGRES_PASSWORD: reportpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
 
  api:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data:
