# ─────────────────────────────────────────────────────────────────────────────
# Kubernetes Secret — Secure Report API
#
# Contains all sensitive environment variables for the API pods.
# stringData values are plain text here; Kubernetes base64-encodes them
# automatically when the Secret is stored in etcd.
#
# IMPORTANT:
#   - Never commit real credentials here.
#   - In a real pipeline, use Sealed Secrets, Vault, or External Secrets Operator.
#   - After any change: kubectl apply -f k8s/secret.yaml
#     then: kubectl rollout restart deployment/report-api
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: report-api-secret
  labels:
    app: report-api
    environment: minikube
type: Opaque
stringData:
  # ── Django Core ─────────────────────────────────────────────────────────────
  # Generate a real key:
  #   python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
  SECRET_KEY: "change-this-to-a-real-secret-key-minimum-50-chars"
  DEBUG: "False"
  ALLOWED_HOSTS: "*"
  DJANGO_LOG_LEVEL: "INFO"

  # ── Database ─────────────────────────────────────────────────────────────────
  # DB_HOST must match the Kubernetes Service name in postgres.yaml
  DB_NAME: "reportdb"
  DB_USER: "reportuser"
  DB_PASSWORD: "reportpass"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"

  # ── Google OAuth ─────────────────────────────────────────────────────────────
  # Leave as empty string to disable Google Sign-In in Kubernetes
  GOOGLE_CLIENT_ID: "your-client-id.apps.googleusercontent.com"
  GOOGLE_CLIENT_SECRET: "GOCSPX-your-secret"
