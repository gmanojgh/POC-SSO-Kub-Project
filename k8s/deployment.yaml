apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-api
spec:
  replicas: 2           # Two instances for high availability
  selector:
    matchLabels:
      app: report-api
  template:
    metadata:
      labels:
        app: report-api
    spec:
      containers:
      - name: report-api
        image: secure-report-api:latest
        imagePullPolicy: Never   # Use local image from Minikube
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: report-api-secret
        readinessProbe:
          httpGet:
            path: /api/auth/login
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: report-api-service
spec:
  type: NodePort
  selector:
    app: report-api
  ports:
  - port: 80
    targetPort: 8000
    nodePort: 30080
